{{ define "main" }}
<article class="post">
  <h1 class="post-title">
    <a href="{{ .Permalink }}">{{ .Title }}</a>
  </h1>
</article>

<div class="guestbook-wrap">
  <p class="guestbook-intro">leave a note. say hello. sign your name.</p>

  <form class="guestbook-form" id="guestbookForm">
    <div class="form-group">
      <label for="gb-name">Name</label>
      <input type="text" id="gb-name" placeholder="your name" maxlength="50" required />
    </div>
    <div class="form-group">
      <label for="gb-message">Message</label>
      <textarea id="gb-message" placeholder="say something nice... this is public..." maxlength="280" rows="3" required></textarea>
    </div>
    <div class="form-group">
      <label>Drawing <span class="gb-label-hint">(optional — draw something small... also public...)</span></label>
      <div class="canvas-wrap">
        <canvas id="gbCanvas" width="400" height="150"></canvas>
        <button type="button" class="canvas-clear" id="canvasClear">clear</button>
      </div>
    </div>
    <button type="submit" class="gb-submit">Sign</button>
    <p class="gb-status" id="gbStatus"></p>
  </form>

  <div class="gb-entries" id="gbEntries">
    <p class="gb-loading">loading entries...</p>
  </div>
</div>

<style>
.guestbook-wrap {
  max-width: 600px;
  padding-top: 1rem;
}
.guestbook-intro {
  font-family: 'Fira Code', monospace;
  font-size: 0.85rem;
  color: #555;
  letter-spacing: 0.1em;
  margin-top: -1rem;
  margin-bottom: 2rem;
}
.guestbook-form {
  margin-bottom: 3rem;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  margin-bottom: 1.2rem;
}
.form-group label {
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  color: #555;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.gb-label-hint {
  text-transform: none;
  color: #444;
  letter-spacing: 0;
}
.form-group input,
.form-group textarea {
  background: transparent;
  border: 1px solid #333;
  color: #ccc;
  font-family: 'Fira Code', monospace;
  font-size: 0.85rem;
  padding: 0.6rem 0.8rem;
  outline: none;
  transition: border-color 0.2s;
  resize: none;
}
.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--accent);
}
.form-group input::placeholder,
.form-group textarea::placeholder {
  color: #444;
}
.canvas-wrap {
  position: relative;
  display: inline-block;
  width: 100%;
}
@media (min-width: 684px) {
  .content {
    padding-top: 0 !important;
  }
  .post {
    padding-top: 0 !important;
  }
}
#gbCanvas {
  width: 100%;
  height: 150px;
  background: #111;
  border: 1px solid #333;
  cursor: crosshair;
  touch-action: none;
  display: block;
}
.canvas-clear {
  position: absolute;
  bottom: 0.5rem;
  right: 0.5rem;
  background: transparent;
  border: 1px solid #333;
  color: #555;
  font-family: 'Fira Code', monospace;
  font-size: 0.7rem;
  padding: 0.2rem 0.5rem;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.canvas-clear:hover {
  color: var(--accent);
  border-color: var(--accent);
}
.gb-submit {
  background: transparent;
  border: 2px dashed var(--accent);
  color: var(--accent);
  font-family: 'Fira Code', monospace;
  font-size: 0.85rem;
  padding: 0.6rem 1.5rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: background 0.2s, color 0.2s;
}
.gb-submit:hover {
  background: var(--accent);
  color: #1a1a1d;
}
.gb-status {
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  color: #555;
  margin-top: 0.75rem;
  min-height: 1rem;
}
.gb-loading {
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  color: #555;
  letter-spacing: 0.1em;
}
.gb-entry {
  border-top: 1px solid #222;
  padding: 1rem 0;
}
.gb-entry-header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 0.4rem;
}
.gb-entry-name {
  font-family: 'Fira Code', monospace;
  font-size: 0.85rem;
  color: var(--accent);
}
.gb-entry-date {
  font-family: 'Fira Code', monospace;
  font-size: 0.7rem;
  color: #444;
}
.gb-entry-message {
  font-family: 'Fira Code', monospace;
  font-size: 0.85rem;
  color: #888;
  line-height: 1.6;
  margin-bottom: 0.5rem;
}
.gb-entry-drawing {
  max-width: 400px;
  width: 100%;
  border: 1px solid #222;
  display: block;
  margin-top: 0.5rem;
}
</style>

<script>
const SUPABASE_URL = 'https://wwhahzrmyzrjahuoccqj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4bWGJ3QX0bMK5krmr8ewUA_abXWyWut';

const canvas = document.getElementById('gbCanvas');
const ctx = canvas.getContext('2d');
let drawing = false;
let hasDrawn = false;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  if (e.touches) {
    return {
      x: (e.touches[0].clientX - rect.left) * scaleX,
      y: (e.touches[0].clientY - rect.top) * scaleY
    };
  }
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

ctx.strokeStyle = '#eec35e';
ctx.lineWidth = 2;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

canvas.addEventListener('mousedown', e => {
  drawing = true;
  const pos = getPos(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
});

canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  hasDrawn = true;
  const pos = getPos(e);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
});

canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  drawing = true;
  const pos = getPos(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drawing) return;
  hasDrawn = true;
  const pos = getPos(e);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
}, { passive: false });

canvas.addEventListener('touchend', () => drawing = false);

document.getElementById('canvasClear').addEventListener('click', () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasDrawn = false;
});

async function loadEntries() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/guestbook?select=*&order=created_at.desc`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  const entries = await res.json();
  const container = document.getElementById('gbEntries');
  if (!entries.length) {
    container.innerHTML = '<p class="gb-loading">no entries yet — be the first!</p>';
    return;
  }
  container.innerHTML = entries.map(e => `
    <div class="gb-entry">
      <div class="gb-entry-header">
        <span class="gb-entry-name">${escapeHtml(e.name)}</span>
        <span class="gb-entry-date">${formatDate(e.created_at)}</span>
      </div>
      <p class="gb-entry-message">${escapeHtml(e.message)}</p>
      ${e.drawing ? `<img class="gb-entry-drawing" src="${e.drawing}" alt="drawing by ${escapeHtml(e.name)}" />` : ''}
    </div>
  `).join('');
}

async function submitEntry(name, message, drawing) {
  const body = { name, message };
  if (drawing) body.drawing = drawing;

  fetch('https://formspree.io/f/mojyladj', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      _subject: 'New guestbook entry on hlwilk.com',
      name: name,
      message: message,
      _replyto: 'noreply@hlwilk.com'
    })
  });

  const res = await fetch(`${SUPABASE_URL}/rest/v1/guestbook`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(body)
  });
  return res.ok;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

document.getElementById('guestbookForm').addEventListener('submit', async e => {
  e.preventDefault();
  const name = document.getElementById('gb-name').value.trim();
  const message = document.getElementById('gb-message').value.trim();
  const drawingData = hasDrawn ? canvas.toDataURL('image/png') : null;
  const status = document.getElementById('gbStatus');
  const btn = document.querySelector('.gb-submit');

  btn.disabled = true;
  btn.textContent = 'signing...';
  status.textContent = '';

  const ok = await submitEntry(name, message, drawingData);
  if (ok) {
    status.textContent = 'signed! thank you.';
    document.getElementById('gb-name').value = '';
    document.getElementById('gb-message').value = '';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasDrawn = false;
    loadEntries();
  } else {
    status.textContent = 'something went wrong. try again?';
  }
  btn.disabled = false;
  btn.textContent = 'Sign';
});

loadEntries();
</script>

{{ end }}
