{{ define "main" }}
<article class="post">
  <h1 class="post-title">
    <a href="{{ .Permalink }}">{{ .Title }}</a>
  </h1>
<div class="about-wrap">
  <div class="about-bio">
    {{ .Content }}
  </div>
  <a href="https://www.instagram.com/linkisur" target="_blank" class="instagram-link">
    <svg class="ig-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="2" width="20" height="20" rx="5"/>
      <circle cx="12" cy="12" r="5"/>
      <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
    </svg>
    @linkisur
  </a>
</div>

<style>
.about-wrap {
  max-width: 600px;
}
.about-bio {
  font-family: 'Fira Code', monospace;
  color: #ccc;
  line-height: 1.8;
  margin-bottom: 2rem;
}
.instagram-link {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  font-family: 'Fira Code', monospace;
  font-size: 0.85rem;
  color: #888;
  text-decoration: none;
  border: 4px dashed var(--accent);
  padding: 0.6rem 1rem;
  transition: color 0.2s, border-color 0.2s;
  letter-spacing: 0.05em;
}
.instagram-link:hover {
  color: #ffb86c;
  border-color: #ffb86c;
}
.ig-icon {
  width: 18px;
  height: 18px;
}
.now-watching {
  margin-top: 2.5rem;
}
.now-watching-title {
  font-family: 'Fira Code', monospace;
  font-size: .9rem;
  color: #555;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 1rem;
  font-weight: 400;
}
.letterboxd-link {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  font-family: 'Fira Code', monospace;
  font-size: 0.85rem;
  color: #888;
  text-decoration: none;
  border: 4px dashed var(--accent);
  padding: 0.6rem 1rem;
  transition: color 0.2s, border-color 0.2s;
  letter-spacing: 0.05em;
}
.letterboxd-link:hover {
  color: #ffb86c;
  border-color: #ffb86c;
}
.lb-icon {
  width: 18px;
  height: 18px;
}
</style>
<div class="now-watching">
    <h2 class="now-watching-title">Now Watching...</h2>
    <a href="https://letterboxd.com/linkisur" target="_blank" class="letterboxd-link">
      <svg class="lb-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 12a4 4 0 1 0 8 0 4 4 0 0 0-8 0zm-6 0a10 10 0 1 1 20 0A10 10 0 0 1 2 12z"/>
      </svg>
      @linkisur on Letterboxd
    </a>
  </div>
</div>
</article>
{{ end }}
