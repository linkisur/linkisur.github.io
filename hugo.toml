baseURL = "https://linkisur.github.io/"
languageCode = "en-us"
theme = "terminal"
pagination.pagerSize = 5

[markup.highlight]
  noClasses = false

[params]
  contentTypeName = "posts"
  showMenuItems = 4
  fullWidthTheme = false
  centerTheme = true

[languages]
  [languages.en]
    languageName = "English"
    title = "linkisur"

    [languages.en.params]
      subtitle = "VFX Artist & Photographer"
      [languages.en.params.logo]
        logoText = "linkisur"
        logoHomeLink = "/"
      [languages.en.menu]
        [[languages.en.menu.main]]
          identifier = "portfolio"
          name = "Portfolio"
          url = "/portfolio"
        [[languages.en.menu.main]]
          identifier = "about"
          name = "About"
          url = "/about"
        [[languages.en.menu.main]]
          identifier = "posts"
          name = "Posts"
          url = "/posts"
