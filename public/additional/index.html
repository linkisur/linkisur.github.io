<script>
const SUPABASE_URL = 'https://wwhahzrmyzrjahuoccqj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4bWGJ3QX0bMK5krmr8ewUA_abXWyWut';

let map;
let mapInitialized = false;

document.querySelectorAll('.misc-item').forEach(item => {
  item.addEventListener('click', () => {
    const section = document.getElementById('section-' + item.dataset.section);
    const isOpen = item.classList.contains('active');
    document.querySelectorAll('.misc-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.misc-section').forEach(s => s.style.display = 'none');
    if (!isOpen) {
      item.classList.add('active');
      section.style.display = 'block';
      if (item.dataset.section === 'coffee' && !mapInitialized) {
        mapInitialized = true;
        initMap();
      } else if (item.dataset.section === 'coffee') {
        map.invalidateSize();
      }
    }
  });
});

function initMap() {
  map = L.map('coffee-map', {
    center: [51.5, -0.1],
    zoom: 12,
    zoomControl: true,
    scrollWheelZoom: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19
  }).addTo(map);

  const coffeeIcon = L.divIcon({
    className: '',
    html: '<div style="width:10px;height:10px;background:#eec35e;border-radius:50%;border:2px solid #1a1a1d;"></div>',
    iconSize: [10, 10],
    iconAnchor: [5, 5]
  });

  loadCoffeeShops(coffeeIcon);
}

async function loadCoffeeShops(coffeeIcon) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/coffee_shops?select=*&order=created_at.desc`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  const shops = await res.json();
  shops.forEach(shop => {
    const marker = L.marker([shop.lat, shop.lng], { icon: coffeeIcon }).addTo(map);
    marker.bindPopup(`
      <div class="popup-name">${shop.name}</div>
      <div class="popup-city">${shop.city}</div>
      ${shop.note ? `<div class="popup-note">${shop.note}</div>` : ''}
    `);
  });
}
