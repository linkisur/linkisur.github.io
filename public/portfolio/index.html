<script>
(function() {
  let currentSeries = 0;
  let currentSlide = 0;

  function getSeries(i) { return document.querySelectorAll('.series')[i]; }

  function showVfxSlide(index) {
    const series = getSeries(0);
    const slides = series.querySelectorAll('.slide');
    if (!slides.length) return;
    slides.forEach(s => s.classList.remove('active', 'exit'));
    currentSlide = (index + slides.length) % slides.length;
    slides[currentSlide].classList.add('active');
    const counter = document.querySelector('.vfx-counter');
    if (counter) {
      counter.querySelector('.current').textContent = currentSlide + 1;
      counter.querySelector('.total').textContent = slides.length;
    }
  }

  function switchSeries(index) {
    document.querySelectorAll('.series').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.series-link').forEach(l => l.classList.remove('active'));
    currentSeries = index;
    currentSlide = 0;
    getSeries(index).classList.add('active');
    document.querySelectorAll('.series-link')[index].classList.add('active');
    const isVfx = getSeries(index).classList.contains('vfx-series');
    const counter = document.querySelector('.vfx-counter');
    const prevBtn = document.querySelector('.gallery-container > .nav-btn.prev');
    const nextBtn = document.querySelector('.gallery-container > .nav-btn.next');
    if (counter) counter.style.display = isVfx ? 'block' : 'none';
    if (prevBtn) prevBtn.style.display = isVfx ? 'block' : 'none';
    if (nextBtn) nextBtn.style.display = isVfx ? 'block' : 'none';
    if (isVfx) showVfxSlide(0);
  }

  const mainPrev = document.querySelector('.gallery-container > .nav-btn.prev');
  const mainNext = document.querySelector('.gallery-container > .nav-btn.next');
  if (mainNext) mainNext.addEventListener('click', () => showVfxSlide(currentSlide + 1));
  if (mainPrev) mainPrev.addEventListener('click', () => showVfxSlide(currentSlide - 1));

  document.querySelectorAll('.series-link').forEach((link, i) => {
    link.addEventListener('click', e => { e.preventDefault(); switchSeries(i); });
  });

  switchSeries(0);

  function initAlbum(albumItem) {
   const counter = document.querySelector('.vfx-counter');
  const prevBtn = document.querySelector('.vfx-nav.prev');
  const nextBtn = document.querySelector('.vfx-nav.next');
    const current = albumItem.querySelector('.current');
    const total = albumItem.querySelector('.total');
    let index = 0;

    if (total) total.textContent = slides.length;

    function showSlide(i) {
      slides.forEach(s => s.classList.remove('active'));
      index = (i + slides.length) % slides.length;
      slides[index].classList.add('active');
      if (current) current.textContent = index + 1;
    }

    if (nextBtn) nextBtn.addEventListener('click', e => { e.stopPropagation(); showSlide(index + 1); });
    if (prevBtn) prevBtn.addEventListener('click', e => { e.stopPropagation(); showSlide(index - 1); });
    showSlide(0);
    return { showSlide };
  }

  const albumNames = document.querySelectorAll('.album-name[data-album]');
  const albumGalleries = document.querySelectorAll('.album-gallery[data-album]');
  const albumControllers = [];

  albumGalleries.forEach((gallery, i) => {
    const slides = gallery.querySelectorAll('.slide');
    const prevBtn = gallery.querySelector('.nav-btn.prev');
    const nextBtn = gallery.querySelector('.nav-btn.next');
    const current = gallery.querySelector('.current');
    const total = gallery.querySelector('.total');
    let index = 0;
    if (total) total.textContent = slides.length;
    function showSlide(n) {
      slides.forEach(s => s.classList.remove('active'));
      index = (n + slides.length) % slides.length;
      slides[index].classList.add('active');
      if (current) current.textContent = index + 1;
    }
   if (nextBtn) nextBtn.addEventListener('click', e => { e.stopPropagation(); showSlide(index + 1); });
if (prevBtn) prevBtn.addEventListener('click', e => { e.stopPropagation(); showSlide(index - 1); });

let touchStartX = null;
gallery.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });

gallery.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) showSlide(index + 1);
    else showSlide(index - 1);
  }
  touchStartX = null;
}, { passive: true });

showSlide(0);
albumControllers.push({ showSlide, getIndex: () => index });
  });

  let openIndex = null;

  function openAlbum(i) {
    albumGalleries.forEach((g, j) => {
      g.classList.toggle('open', j === i);
    });
    albumNames.forEach((n, j) => {
      n.classList.toggle('active', j === i);
    });
    openIndex = i;
    const trail = document.getElementById('trailSection');
    if (trail) {
      trail.style.transition = 'margin-top 0.5s ease';
      trail.style.marginTop = '4rem';
    }
  }
document.addEventListener('keydown', e => {
    if (openIndex === null) return;
    const controller = albumControllers[openIndex];
    if (!controller) return;
    if (e.key === 'ArrowRight') controller.showSlide(controller.getIndex() + 1);
    if (e.key === 'ArrowLeft') controller.showSlide(controller.getIndex() - 1);
  });

  albumNames.forEach((name, i) => {
    name.addEventListener('click', () => openAlbum(i));
    if (window.matchMedia('(hover: hover)').matches) {
      name.addEventListener('mouseenter', () => openAlbum(i));
    }
  });

  function animateTrailDown() {
    const trail = document.getElementById('trailSection');
    if (trail) {
      trail.style.transition = 'margin-top 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
      trail.style.marginTop = '4rem';
    }
  }

  const trailSection = document.getElementById('trailSection');
  const trailHint = document.getElementById('trailHint');
  const imgs = Array.from(document.querySelectorAll('.trail-img'));

  if (!imgs.length) return;

  const shuffled = imgs.sort(() => Math.random() - 0.5);
  let imgIndex = 0;
  let lastX = null;
  let lastY = null;
  let hasMovedOnce = false;
  const DISTANCE_THRESHOLD = window.matchMedia('(max-width: 768px)').matches ? 30 : 80;

 function spawnImage(x, y) {
    const rect = trailSection.getBoundingClientRect();
    const localX = x - rect.left;
    const localY = y - rect.top;
    const img = shuffled[imgIndex % shuffled.length];    imgIndex++;
    const offsetX = (Math.random() - 0.5) * 30;
    const offsetY = (Math.random() - 0.5) * 30;
    img.style.left = (localX - 220 + offsetX) + 'px';
    img.style.top = (localY - 160 + offsetY) + 'px';
    img.style.transform = 'rotate(0deg) scale(1)';
    img.style.opacity = '1';
    img.style.transition = 'none';
    img.style.zIndex = imgIndex;
  }

  trailSection.addEventListener('mousemove', e => {
    if (!hasMovedOnce) {
      hasMovedOnce = true;
      trailHint.style.opacity = '0';
    }
    if (lastX === null) {
      lastX = e.clientX;
      lastY = e.clientY;
      spawnImage(e.clientX, e.clientY);
      return;
    }
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist >= DISTANCE_THRESHOLD) {
      lastX = e.clientX;
      lastY = e.clientY;
      spawnImage(e.clientX, e.clientY);
    }
  });

  trailSection.addEventListener('mouseleave', () => {
    lastX = null;
    lastY = null;
  });

  trailSection.addEventListener('touchmove', function(e) {
    e.preventDefault();
    e.stopPropagation();
    const touch = e.changedTouches[0];
    if (!hasMovedOnce) {
      hasMovedOnce = true;
      trailHint.style.opacity = '0';
    }
    if (lastX === null) {
      lastX = touch.clientX;
      lastY = touch.clientY;
      spawnImage(touch.clientX, touch.clientY);
      return;
    }
    const dx = touch.clientX - lastX;
    const dy = touch.clientY - lastY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist >= DISTANCE_THRESHOLD) {
      lastX = touch.clientX;
      lastY = touch.clientY;
      spawnImage(touch.clientX, touch.clientY);
    }
  }, { passive: false, capture: true });

  trailSection.addEventListener('touchend', () => {
    lastX = null;
    lastY = null;
  });

})();
</script>
